openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/v1/stuck-sentences/{stuckSentenceId}/similar-sets:
    post:
      tags:
      - similar-sentence-controller
      operationId: createSetForStuckSentence
      parameters:
      - name: stuckSentenceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: count
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: difficulty
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SimilarSetResponse'
  /api/v1/stuck-sentences/{stuckSentenceId}/explain:
    post:
      tags:
      - explain-controller
      operationId: explainStuckSentence
      parameters:
      - name: stuckSentenceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: level
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ExplainResponse'
  /api/v1/sentences/{sentenceId}/similar-sets:
    post:
      tags:
      - similar-sentence-controller
      operationId: createSet
      parameters:
      - name: sentenceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: count
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: difficulty
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SimilarSetResponse'
  /api/v1/sentences/{sentenceId}/explain:
    post:
      tags:
      - explain-controller
      operationId: explain
      parameters:
      - name: sentenceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: level
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ExplainResponse'
  /api/v1/reports/{reportId}/stamp:
    post:
      tags:
      - report-controller
      operationId: sendStamp
      parameters:
      - name: reportId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
  /api/v1/practice/attempts:
    post:
      tags:
      - practice-controller
      operationId: submit
      parameters:
      - name: childId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      - name: targetText
        in: query
        required: true
        schema:
          type: string
      - name: compareToAttemptId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - audio
              type: object
              properties:
                audio:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PracticeAttemptResponse'
  /api/v1/hatch-rewards/{hatchRewardId}/claim:
    post:
      tags:
      - reward-controller
      operationId: claim
      parameters:
      - name: hatchRewardId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HatchRewardSummary'
  /api/v1/games/word-match/pairs:
    get:
      tags:
      - game-controller
      operationId: listPairs
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WordMatchPairSummary'
    post:
      tags:
      - game-controller
      operationId: createPair
      parameters:
      - name: word
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - audio
              type: object
              properties:
                audio:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/WordMatchPairSummary'
  /api/v1/children/{childId}/progress/reward-selection:
    post:
      tags:
      - progress-controller
      operationId: selectReward
      parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RewardSelectionRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ProgressResponse'
  /api/v1/captures:
    post:
      tags:
      - capture-controller
      operationId: createCapture
      parameters:
      - name: childId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CaptureResponse'
  /api/v1/books/sentences/{sentenceId}/stuck:
    post:
      tags:
      - book-controller
      operationId: toggleStuck
      parameters:
      - name: sentenceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkStuckRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/MarkStuckResponse'
  /api/v1/similar-sets/{setId}/items/{itemId}/complete:
    patch:
      tags:
      - similar-sentence-controller
      operationId: completeItem
      parameters:
      - name: setId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SimilarSetResponse'
  /api/v1/captures/sentences/{sentenceId}:
    patch:
      tags:
      - capture-controller
      operationId: editSentence
      parameters:
      - name: sentenceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditSentenceRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CaptureSentenceSummary'
  /api/v1/words/{word}/card:
    get:
      tags:
      - explain-controller
      operationId: getWordCard
      parameters:
      - name: word
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/WordCardResponse'
  /api/v1/similar-sets/{setId}:
    get:
      tags:
      - similar-sentence-controller
      operationId: getSet
      parameters:
      - name: setId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SimilarSetResponse'
  /api/v1/rewards/catalog:
    get:
      tags:
      - reward-controller
      operationId: getCatalog
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RewardCatalogItem'
  /api/v1/reports/{reportId}:
    get:
      tags:
      - report-controller
      operationId: getReport
      parameters:
      - name: reportId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ReportResponse'
  /api/v1/health:
    get:
      tags:
      - health-controller
      operationId: health
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /api/v1/games/word-match/round:
    get:
      tags:
      - game-controller
      operationId: getRound
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WordMatchPairSummary'
  /api/v1/children/{childId}:
    get:
      tags:
      - user-controller
      operationId: getChildProfile
      parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ChildProfileResponse'
  /api/v1/children/{childId}/reports:
    get:
      tags:
      - report-controller
      operationId: listReports
      parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportSummary'
  /api/v1/children/{childId}/report:
    get:
      tags:
      - report-controller
      operationId: getLatestReport
      parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ReportResponse'
  /api/v1/children/{childId}/report/child:
    get:
      tags:
      - report-controller
      operationId: getChildReport
      parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ChildReportResponse'
  /api/v1/children/{childId}/progress:
    get:
      tags:
      - progress-controller
      operationId: getProgress
      parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ProgressResponse'
  /api/v1/children/{childId}/hatch-rewards:
    get:
      tags:
      - reward-controller
      operationId: listHatchRewards
      parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HatchRewardSummary'
  /api/v1/books:
    get:
      tags:
      - book-controller
      operationId: listBooks
      parameters:
      - name: childId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookSummary'
  /api/v1/books/{bookId}:
    get:
      tags:
      - book-controller
      operationId: getBook
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: childId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BookSummary'
  /api/v1/books/{bookId}/stuck-sentences:
    get:
      tags:
      - book-controller
      operationId: listStuckSentences
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: childId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StuckSentenceSummary'
  /api/v1/books/{bookId}/pages/{pageIndex}:
    get:
      tags:
      - book-controller
      operationId: getPage
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: pageIndex
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: childId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BookPageResponse'
  /api/v1/books/{bookId}/completion-summary:
    get:
      tags:
