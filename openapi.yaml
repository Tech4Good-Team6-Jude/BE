      operationId: getCompletionSummary
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: childId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BookCompletionSummary'
components:
  schemas:
    EggRewardInfo:
      type: object
      properties:
        eggsGained:
          type: integer
          format: int32
        currentHatchProgress:
          type: integer
          format: int32
        eggsPerHatch:
          type: integer
          format: int32
        justHatched:
          type: boolean
        hatchReward:
          $ref: '#/components/schemas/HatchRewardSummary'
    HatchRewardSummary:
      type: object
      properties:
        hatchRewardId:
          type: integer
          format: int64
        rewardCode:
          type: string
        brand:
          type: string
        name:
          type: string
        imageUrl:
          type: string
        issuedAt:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time
        sentByGuardian:
          type: boolean
        claimed:
          type: boolean
        claimedAt:
          type: string
          format: date-time
    SimilarSentenceSummary:
      type: object
      properties:
        itemId:
          type: integer
          format: int64
        orderIndex:
          type: integer
          format: int32
        text:
          type: string
        audioUrl:
          type: string
        completed:
          type: boolean
    SimilarSetResponse:
      type: object
      properties:
        setId:
          type: integer
          format: int64
        sourceSentenceId:
          type: integer
          format: int64
        sourceType:
          type: string
        pattern:
          type: string
        difficulty:
          type: string
        sentences:
          type: array
          items:
            $ref: '#/components/schemas/SimilarSentenceSummary'
        eggReward:
          $ref: '#/components/schemas/EggRewardInfo'
    ExplainResponse:
      type: object
      properties:
        queryId:
          type: integer
          format: int64
        sentenceId:
          type: integer
          format: int64
        level:
          type: integer
          format: int32
        originalText:
          type: string
        explainedText:
          type: string
        keyWords:
          type: array
          items:
            $ref: '#/components/schemas/KeyWordDetail'
        audioUrl:
          type: string
        words:
          type: array
          items:
            $ref: '#/components/schemas/WordTimestamp'
    KeyWordDetail:
      type: object
      properties:
        word:
          type: string
        meaning:
          type: string
    WordTimestamp:
      type: object
      properties:
        word:
          type: string
        startMs:
          type: integer
          format: int64
        endMs:
          type: integer
          format: int64
    MismatchSegment:
      type: object
      properties:
        expectedWord:
          type: string
        heardAs:
          type: string
        correctionType:
          type: string
        modelAudioUrl:
          type: string
    PracticeAttemptResponse:
      type: object
      properties:
        attemptId:
          type: integer
          format: int64
        sttText:
          type: string
        accuracy:
          type: number
          format: double
        passed:
          type: boolean
        mismatches:
          type: array
          items:
            $ref: '#/components/schemas/MismatchSegment'
        feedback:
          type: string
        eggReward:
          $ref: '#/components/schemas/EggRewardInfo'
    WordMatchPairSummary:
      type: object
      properties:
        pairId:
          type: integer
          format: int64
        word:
          type: string
        audioUrl:
          type: string
    RewardSelectionRequest:
      type: object
      properties:
        guardianId:
          type: integer
          format: int64
        rewardCode:
          type: string
    ProgressResponse:
      type: object
      properties:
        eggCount:
          type: integer
          format: int32
        currentHatchProgress:
          type: integer
          format: int32
        totalHatchesCompleted:
          type: integer
          format: int32
        eggsPerHatch:
          type: integer
          format: int32
        stampCount:
          type: integer
          format: int32
        averageAccuracy:
          type: number
          format: double
        selectedRewardCode:
          type: string
    CaptureResponse:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        imageUrl:
          type: string
        sentences:
          type: array
          items:
            $ref: '#/components/schemas/CaptureSentenceSummary'
    CaptureSentenceSummary:
      type: object
      properties:
        sentenceId:
          type: integer
          format: int64
        orderIndex:
          type: integer
          format: int32
        text:
          type: string
    MarkStuckRequest:
      type: object
      properties:
        childId:
          type: integer
          format: int64
    MarkStuckResponse:
      type: object
      properties:
        stuck:
          type: boolean
        stuckSentence:
          $ref: '#/components/schemas/StuckSentenceSummary'
    StuckSentenceSummary:
      type: object
      properties:
        stuckSentenceId:
          type: integer
          format: int64
        sentenceId:
          type: integer
          format: int64
        text:
          type: string
        pattern:
          type: string
        resolved:
          type: boolean
        createdAt:
          type: string
          format: date-time
    EditSentenceRequest:
      type: object
      properties:
        text:
          type: string
    WordCardResponse:
      type: object
      properties:
        word:
          type: string
        meaning:
          type: string
        example:
          type: string
        audioUrl:
          type: string
    RewardCatalogItem:
      type: object
      properties:
        code:
          type: string
        brand:
          type: string
        name:
          type: string
        imageUrl:
          type: string
        validDays:
          type: integer
          format: int32
    ErrorPatternSummary:
      type: object
      properties:
        errorType:
          type: string
        occurrenceCount:
          type: integer
          format: int32
    PracticeAttemptSummary:
      type: object
      properties:
        attemptId:
          type: integer
          format: int64
        targetText:
          type: string
        accuracy:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
    PronunciationComparison:
      type: object
      properties:
        targetText:
          type: string
        previousAudioUrl:
          type: string
        currentAudioUrl:
          type: string
    ReportResponse:
      type: object
      properties:
        reportId:
          type: integer
          format: int64
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        highlight:
          type: string
        summary:
          type: string
        accuracy:
          type: number
          format: double
        previousAccuracy:
          type: number
          format: double
        accuracyDeltaPercentagePoint:
          type: number
          format: double
        learningSessionCount:
          type: integer
          format: int32
        additionalSentenceCount:
          type: integer
          format: int32
        weeklyEggGain:
          type: integer
          format: int32
        attempts:
          type: array
          items:
            $ref: '#/components/schemas/PracticeAttemptSummary'
        errorPatterns:
          type: array
          items:
            $ref: '#/components/schemas/ErrorPatternSummary'
        pronunciationComparison:
          $ref: '#/components/schemas/PronunciationComparison'
        stampSent:
          type: boolean
    ChildProfileResponse:
      type: object
      properties:
        childId:
          type: integer
          format: int64
        name:
          type: string
    ReportSummary:
      type: object
      properties:
        reportId:
          type: integer
          format: int64
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        highlight:
          type: string
        stampSent:
          type: boolean
    ChildReportResponse:
      type: object
      properties:
        sentencesRead:
          type: integer
          format: int32
        accuracy:
          type: number
          format: double
        previousAccuracy:
          type: number
          format: double
        accuracyDeltaPercentagePoint:
          type: number
          format: double
        streakDays:
          type: integer
          format: int32
        eggCount:
          type: integer
          format: int32
        currentHatchProgress:
          type: integer
          format: int32
        eggsPerHatch:
          type: integer
          format: int32
        patternCounts:
          type: array
          items:
            $ref: '#/components/schemas/ErrorPatternSummary'
        weeklyCheckIns:
          type: array
          items:
            $ref: '#/components/schemas/DayCheckIn'
        encouragementMessage:
          type: string
    DayCheckIn:
      type: object
      properties:
        label:
          type: string
        checked:
          type: boolean
    BookSummary:
      type: object
      properties:
        bookId:
          type: integer
          format: int64
        title:
          type: string
        author:
          type: string
        coverImageUrl:
          type: string
        difficulty:
          type: string
        totalPages:
          type: integer
          format: int32
        estimatedMinutes:
          type: integer
          format: int32
        stuckSentenceCount:
          type: integer
          format: int32
    BookPageResponse:
      type: object
      properties:
        bookId:
          type: integer
          format: int64
        pageIndex:
          type: integer
          format: int32
        totalPages:
          type: integer
          format: int32
        pageImageUrl:
          type: string
        sentences:
          type: array
          items:
            $ref: '#/components/schemas/BookSentenceSummary'
    BookSentenceSummary:
      type: object
      properties:
        sentenceId:
          type: integer
          format: int64
        orderIndex:
          type: integer
          format: int32
        text:
          type: string
        stuck:
          type: boolean
    BookCompletionSummary:
      type: object
      properties:
        bookId:
