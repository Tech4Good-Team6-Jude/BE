server:
  port: 8080

spring:
  application:
    name: dobak-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:h2:file:./data/dobak;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# 파일 저장 (해커톤 단계: 로컬 디스크. 추후 S3 등으로 교체 가능)
file:
  storage:
    base-path: ./uploads

# 멘토님 구조 기준: 우리 서버(Service Server, /api/v1)가 별도 Inference Server(/internal/v1)를
# HTTP로 호출하는 구조.
# provider: mock(기본값) -> MockInferenceClient 사용, http -> HttpInferenceClient가 실제 AI 서버를 호출.
# 로컬에서 AI 서버(uvicorn app.main:app --port 8001)를 같이 띄운 뒤 http로 바꿔서 테스트하면 됨.
inference:
  provider: http
  service:
    base-url: http://localhost:8001/internal/v1
